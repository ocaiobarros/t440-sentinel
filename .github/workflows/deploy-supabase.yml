name: Deploy Supabase (DB + Edge Functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: mlmvnngtmptiuvjvnivb

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Link project
        run: npx supabase@latest link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations (with auto-repair)
        run: |
          set +e
          OUTPUT=$(npx supabase@latest db push 2>&1)
          STATUS=$?
          set -e

          echo "$OUTPUT"

          if [ $STATUS -eq 0 ]; then
            exit 0
          fi

          if echo "$OUTPUT" | grep -q "Remote migration versions not found in local migrations directory"; then
            MISSING_VERSION=$(echo "$OUTPUT" | sed -n 's/.*reverted \([0-9]\{14\}\).*/\1/p' | head -n1)

            if [ -n "$MISSING_VERSION" ]; then
              echo "⚠️ Repairing remote-only migration: $MISSING_VERSION"
              npx supabase@latest migration repair "$MISSING_VERSION" --status reverted
              echo "🔁 Retrying db push..."
              npx supabase@latest db push
              exit 0
            fi
          fi

          exit $STATUS
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy all Edge Functions
        run: |
          for fn_dir in supabase/functions/*/; do
            fn_name=$(basename "$fn_dir")
            if [[ "$fn_name" == _* ]]; then
              continue
            fi
            echo "🚀 Deploying: $fn_name"
            npx supabase@latest functions deploy "$fn_name" --no-verify-jwt --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Summary
        run: echo "✅ Supabase deployment complete — migrations + edge functions synced."
