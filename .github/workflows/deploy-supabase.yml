name: Deploy Supabase (DB + Edge Functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: mlmvnngtmptiuvjvnivb

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Link project
        run: npx supabase@latest link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations (with auto-repair)
        run: |
          MAX_RETRIES=5
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "🔄 Attempt $ATTEMPT of $MAX_RETRIES..."

            set +e
            OUTPUT=$(npx supabase@latest db push 2>&1)
            STATUS=$?
            set -e

            echo "$OUTPUT"

            if [ $STATUS -eq 0 ]; then
              echo "✅ db push succeeded."
              exit 0
            fi

            if echo "$OUTPUT" | grep -q "Remote migration versions not found in local migrations directory"; then
              # Extract ALL missing version IDs from the suggested repair command
              VERSIONS=$(echo "$OUTPUT" | grep -oE '[0-9]{14}' | sort -u)

              if [ -n "$VERSIONS" ]; then
                for VER in $VERSIONS; do
                  echo "⚠️ Repairing remote-only migration: $VER"
                  npx supabase@latest migration repair "$VER" --status reverted || true
                done
                continue
              fi
            fi

            echo "❌ Unrecoverable error on attempt $ATTEMPT"
            exit $STATUS
          done

          echo "❌ Exhausted $MAX_RETRIES retries"
          exit 1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy all Edge Functions
        run: |
          for fn_dir in supabase/functions/*/; do
            fn_name=$(basename "$fn_dir")
            if [[ "$fn_name" == _* ]]; then
              continue
            fi
            echo "🚀 Deploying: $fn_name"
            npx supabase@latest functions deploy "$fn_name" --no-verify-jwt --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Summary
        run: echo "✅ Supabase deployment complete — migrations + edge functions synced."
