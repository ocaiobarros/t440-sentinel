name: Deploy Supabase (DB + Edge Functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: mlmvnngtmptiuvjvnivb

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Link project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy all Edge Functions
        run: |
          for fn_dir in supabase/functions/*/; do
            fn_name=$(basename "$fn_dir")
            # Skip directories starting with _ (shared modules)
            if [[ "$fn_name" == _* ]]; then
              continue
            fi
            echo "🚀 Deploying: $fn_name"
            supabase functions deploy "$fn_name" --no-verify-jwt --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Summary
        run: echo "✅ Supabase deployment complete — migrations + edge functions synced."
